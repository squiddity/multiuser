services:
  postgres:
    image: pgvector/pgvector:pg16
    shm_size: 256m
    security_opt:
      - seccomp:unconfined
      - apparmor:unconfined
    environment:
      POSTGRES_USER: multiuser
      POSTGRES_PASSWORD: multiuser
      POSTGRES_DB: multiuser
    volumes:
      - postgres-api-test:/var/lib/postgresql/data
      - ./postgres-init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U multiuser -d multiuser -h 127.0.0.1']
      interval: 2s
      timeout: 5s
      retries: 20

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://multiuser:multiuser@postgres:5432/multiuser
      API_PORT: '3000'
      NODE_ENV: test
      LOG_LEVEL: warn
    ports:
      - '3000:3000'
    healthcheck:
      test: ['CMD', 'curl', '-sf', 'http://localhost:3000/health']
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  postgres-api-test:
